<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Meow Health</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root {
      --primary: #FF8C00; 
      --bg: #000000;      
      --card-bg: rgba(255, 255, 255, 0.08); 
      --text: #ffffff;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      margin: 0; padding-bottom: 90px;
      overflow-x: hidden;
    }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .water-circle {
      width: 180px; height: 180px;
      border-radius: 50%;
      border: 8px solid rgba(255, 140, 0, 0.2);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 20px auto;
      background: radial-gradient(circle, rgba(255,140,0,0.1) 0%, transparent 70%);
    }

    .water-value { font-size: 2.2rem; font-weight: 800; color: var(--primary); }

    .btn-main {
      background: var(--primary);
      color: #000; font-weight: 700;
      border-radius: 12px; border: none;
      padding: 12px 20px; transition: 0.2s;
      width: 100%;
    }
    .btn-main:active { transform: scale(0.98); }

    .vit-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .check-box {
      width: 30px; height: 30px; border-radius: 10px;
      border: 2px solid var(--primary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .check-box.done { background: var(--primary); color: #000; }

    .nav-bar {
      position: fixed; bottom: 0; width: 100%; height: 75px;
      background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px);
      display: flex; justify-content: space-around; align-items: center;
      border-top: 1px solid rgba(255,255,255,0.1);
      z-index: 1000;
    }
    .nav-item { color: #555; font-size: 1.4rem; cursor: pointer; }
    .nav-item.active { color: var(--primary); }
  </style>
</head>
<body>

  <div class="container mt-4">
    <h2 class="fw-bold text-center mb-4">Meow <span style="color: var(--primary)">Health</span></h2>

    <div class="glass-card text-center">
      <h6 class="text-uppercase small fw-bold opacity-50">Lượng nước hôm nay</h6>
      <div class="water-circle">
        <i class="bi bi-droplet-fill text-warning mb-1"></i>
        <div class="water-value" id="water-current">0</div>
        <div class="small opacity-50">/ 2000 ml</div>
      </div>
      <div class="row g-2">
        <div class="col-6"><button class="btn-main" onclick="addWater(200)">+ 200ml</button></div>
        <div class="col-6"><button class="btn-main" onclick="addWater(500)">+ 500ml</button></div>
      </div>
    </div>

    <div class="glass-card">
      <h6 class="text-uppercase small fw-bold opacity-50 mb-3">Vitamin hàng ngày</h6>
      <div id="vitamin-list">
        <div class="vit-item">
          <span>Vitamin C</span>
          <div class="check-box" onclick="toggleVit(this, 'Vitamin C')"><i class="bi bi-check-lg"></i></div>
        </div>
        <div class="vit-item">
          <span>Omega 3</span>
          <div class="check-box" onclick="toggleVit(this, 'Omega 3')"><i class="bi bi-check-lg"></i></div>
        </div>
      </div>
    </div>
  </div>

  <div class="nav-bar">
    <div class="nav-item active"><i class="bi bi-house-heart-fill"></i></div>
    <div class="nav-item"><i class="bi bi-clock-history"></i></div>
    <div class="nav-item"><i class="bi bi-gear-fill"></i></div>
  </div>

  <script>
    // URL lấy từ screenshot của bạn
    const API_URL = "https://script.google.com/macros/s/AKfycbxu1BjtOtajx0adv9-azOq-ooe12KEVcT3CimxPuPRYx3_DmaXnveNCbc22SaCRNn6y/exec"; 
    let currentWater = 0;

    async function sendToSheet(type, value) {
      const payload = { action: 'logData', type: type, value: value, note: "" };
      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors', // Tránh lỗi CORS khi gọi Apps Script
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } catch (error) {
        console.error("Lỗi gửi dữ liệu:", error);
      }
    }

    function addWater(ml) {
      currentWater += ml;
      document.getElementById('water-current').innerText = currentWater;
      sendToSheet('Water', ml);
    }

    function toggleVit(el, name) {
      el.classList.toggle('done');
      if(el.classList.contains('done')) {
        sendToSheet('Vitamin', name);
      }
    }
  </script>
</body>
</html>
