<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Meow Health</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF8C00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Meow Health">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root {
      --primary: #FF8C00; 
      --bg: #F0F4F8; 
      --card-bg: rgba(255, 255, 255, 0.85); 
      --text: #2C3E50; 
      --success: #2ecc71;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      margin: 0; padding-bottom: 90px;
      overflow-x: hidden;
      -webkit-user-select: none; 
      user-select: none;         
      -webkit-touch-callout: none; 
    }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 1);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); 
    }

    /* --- VÒNG TRÒN TIẾN ĐỘ SVG --- */
    .water-circle {
      width: 200px; height: 200px; 
      position: relative;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 10px auto;
    }
    .progress-ring {
      position: absolute;
      top: 0; left: 0;
      transform: rotate(-90deg); 
    }
    .progress-ring__circle {
      transition: stroke-dashoffset 0.5s ease; 
      stroke-linecap: round; 
    }
    #water-icon { color: var(--primary); font-size: 1.5rem; z-index: 1; transition: all 0.5s ease; }
    .water-value { font-size: 2.2rem; font-weight: 800; color: var(--primary); z-index: 1; transition: all 0.5s ease; }
    .water-goal-text { font-size: 0.85rem; opacity: 0.5; z-index: 1; }

    /* --- TRẠNG THÁI ĐẠT MỤC TIÊU --- */
    .goal-reached .progress-ring__circle { stroke: var(--success) !important; }
    .goal-reached #water-current, .goal-reached #water-icon {
      color: var(--success) !important;
      text-shadow: 0 0 15px rgba(46, 204, 113, 0.2);
    }

    /* --- NÚT BẤM & CHECKBOX --- */
    .btn-main {
      background: var(--primary); color: #ffffff; 
      font-weight: 700;
      border-radius: 12px; border: none; padding: 12px 20px; transition: 0.2s; width: 100%;
      box-shadow: 0 4px 12px rgba(255, 140, 0, 0.25);
    }
    .btn-main:active { transform: scale(0.98); }
    
    .vit-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; font-weight: 500;}
    .check-box {
      width: 32px; height: 32px; border-radius: 10px;
      border: 2px solid var(--primary); cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: 0.3s;
      background: #ffffff;
    }
    .check-box.done { background: var(--primary); color: #ffffff; }

    /* --- THANH ĐIỀU HƯỚNG --- */
    .nav-bar {
      position: fixed; bottom: 0; width: 100%; height: 75px;
      background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
      display: flex; justify-content: space-around; align-items: center;
      border-top: 1px solid rgba(0,0,0,0.05); z-index: 1000;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.03);
    }
    .nav-item { color: #A0AEC0; font-size: 1.4rem; cursor: pointer; transition: 0.2s; }
    
    /* --- LỊCH SỬ --- */
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      background: #ffffff; border-radius: 18px;
      padding: 15px 20px; margin-bottom: 12px; border-left: 5px solid var(--primary);
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }
    .history-date { font-weight: 700; font-size: 0.95rem; flex: 1; }
    .history-stats { text-align: right; flex: 1; }
    .stat-water { font-weight: 800; font-size: 1rem; }
    .stat-vit { font-size: 0.75rem; color: #7F8C8D; margin-top: 2px; }
    .text-success-health { color: var(--success) !important; }

    .opacity-50 { opacity: 0.7 !important; }
  </style>
</head>
<body>

  <div class="container mt-4">
    <h2 class="fw-bold text-center mb-4">Meow <span style="color: var(--primary)">Health</span></h2>

    <div id="tab-home">
      <div class="glass-card text-center">
        <h6 class="text-uppercase small fw-bold opacity-50">Lượng nước hôm nay</h6>
        
        <div class="water-circle" id="water-container">
          <svg class="progress-ring" width="200" height="200">
            <circle stroke="rgba(255, 140, 0, 0.1)" stroke-width="8" fill="transparent" r="85" cx="100" cy="100"/>
            <circle id="progress-bar" class="progress-ring__circle" stroke="#FF8C00" stroke-width="8" stroke-dasharray="534.07" stroke-dashoffset="534.07" fill="transparent" r="85" cx="100" cy="100"/>
          </svg>

          <i class="bi bi-droplet-fill mb-1" id="water-icon"></i>
          <div class="water-value" id="water-current">0</div>
          <div class="water-goal-text">/ 2000 ml</div>
        </div>

        <div class="row g-2">
          <div class="col-6"><button class="btn-main" onclick="addWater(100)">+ 100ml</button></div>
          <div class="col-6"><button class="btn-main" onclick="addWater(200)">+ 200ml</button></div>
        </div>
      </div>

      <div class="glass-card">
        <h6 class="text-uppercase small fw-bold opacity-50 mb-2">Vitamin hàng ngày</h6>
        <div class="vit-item">
          <span>Vitamin C</span>
          <div class="check-box" id="check-vit-c" onclick="toggleVit('Vitamin C')">
            <i class="bi bi-check-lg"></i>
          </div>
        </div>
      </div>
    </div>

    <div id="tab-history" style="display:none;">
      <h5 class="fw-bold mb-3 ps-2">Lịch sử theo dõi</h5>
      <div id="history-list">
        <div class="text-center opacity-50 small mt-5">Đang tải dữ liệu lịch sử...</div>
      </div>
    </div>
    
    <div id="tab-settings" style="display:none;">
      <h5 class="fw-bold mb-3 ps-2">Cài đặt</h5>
      <div class="glass-card text-center">
        <h6 class="text-uppercase small fw-bold opacity-50 mb-3">Ứng dụng</h6>
        
        <button id="btn-install" class="btn-main mb-2" style="display: none;">
          <i class="bi bi-download me-2"></i> Cài đặt App ra màn hình
        </button>
        
        <p id="ios-guide" class="small text-danger mt-2" style="display: none; font-weight: 500;">
          *Để cài đặt trên iPhone/iPad: Hãy bấm nút Chia sẻ (⍐) ở cạnh dưới màn hình Safari và chọn "Thêm vào MH chính".
        </p>
      </div>
    </div>
  </div>

  <div class="nav-bar">
    <div class="nav-item" onclick="switchTab('home', this)" style="color: var(--primary)"><i class="bi bi-house-heart-fill fs-3"></i></div>
    <div class="nav-item" onclick="switchTab('history', this)"><i class="bi bi-clock-history fs-3"></i></div>
    <div class="nav-item" onclick="switchTab('settings', this)"><i class="bi bi-gear-fill fs-3"></i></div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxJw7KsWwTi27pWk5MG02Hi5tIFTZBoCizHDhHVoMPSbDG49OTvKFi0qTI1yYKCz8Je/exec; 
    let currentWater = 0;

    // HÀM CẬP NHẬT VÒNG TRÒN SVG
    function updateCircle(value) {
      const circle = document.getElementById('progress-bar');
      const container = document.getElementById('water-container');
      const radius = circle.r.baseVal.value;
      const circumference = 2 * Math.PI * radius; // Chu vi = 534.07

      const goal = 2000;
      const percentage = Math.min(value / goal, 1); 
      const offset = circumference - (percentage * circumference);
      
      circle.style.strokeDashoffset = offset;

      if (value >= goal) container.classList.add('goal-reached');
      else container.classList.remove('goal-reached');
    }

    // ĐỒNG BỘ 2 LỚP: ƯU TIÊN MÁY TÍNH -> NGẦM KIỂM TRA SERVER
    async function initApp() {
      const waterDisplay = document.getElementById('water-current');
      const container = document.getElementById('water-container');
      const vitCheck = document.getElementById('check-vit-c');

      const todayStr = new Date().toLocaleDateString('vi-VN');
      const savedDate = localStorage.getItem('meowHealthDate') || "";

      if (savedDate !== todayStr) {
        currentWater = 0;
        localStorage.setItem('meowHealthWater', 0);
        localStorage.setItem('meowHealthVitC', 'false');
        localStorage.setItem('meowHealthDate', todayStr);
      } else {
        currentWater = parseInt(localStorage.getItem('meowHealthWater')) || 0;
        if (localStorage.getItem('meowHealthVitC') === 'true') {
          vitCheck.classList.add('done');
        }
      }

      waterDisplay.innerText = currentWater;
      updateCircle(currentWater); // Cập nhật vòng tròn khi mở app

      try {
        const response = await fetch(API_URL + "?action=sync");
        const serverData = await response.json();

        const localVit = localStorage.getItem('meowHealthVitC') === 'true';
        
        if (serverData.water !== currentWater || serverData.vit !== localVit || serverData.date !== savedDate) {
          console.log("Phát hiện dữ liệu mới từ máy chủ. Đang cập nhật...");
          
          currentWater = serverData.water;
          
          waterDisplay.innerText = currentWater;
          updateCircle(currentWater); // Cập nhật vòng tròn nếu có data từ server

          if (serverData.vit) vitCheck.classList.add('done');
          else vitCheck.classList.remove('done');

          localStorage.setItem('meowHealthWater', currentWater);
          localStorage.setItem('meowHealthVitC', serverData.vit ? 'true' : 'false');
          localStorage.setItem('meowHealthDate', serverData.date);
        } else {
          console.log("Dữ liệu đã đồng bộ, không cần chỉnh sửa.");
        }

      } catch (error) {
        console.log("Đang offline hoặc lỗi mạng. Tiếp tục dùng dữ liệu trên máy.");
      }
    }

    async function sendToSheet(type, value) {
      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ action: 'logData', type: type, value: value })
        });
      } catch (error) { console.error("Lỗi:", error); }
    }

    let waterTimeout;
    let pendingWater = 0;

    function addWater(ml) {
      currentWater += ml;
      pendingWater += ml; 
      
      localStorage.setItem('meowHealthWater', currentWater);
      document.getElementById('water-current').innerText = currentWater;
      
      updateCircle(currentWater); // Vòng tròn chạy ngay lập tức khi bấm nút

      clearTimeout(waterTimeout); 
      waterTimeout = setTimeout(() => {
        sendToSheet('Water', pendingWater);
        pendingWater = 0; 
      }, 1500); 
    }

    function toggleVit(name) {
      const el = document.getElementById('check-vit-c');
      if (!el.classList.contains('done')) {
        el.classList.add('done');
        localStorage.setItem('meowHealthVitC', 'true');
        sendToSheet('Vitamin', name);
      }
    }

    function switchTab(tabName, el) {
      document.getElementById('tab-home').style.display = 'none';
      document.getElementById('tab-history').style.display = 'none';
      document.getElementById('tab-settings').style.display = 'none';
      document.getElementById('tab-' + tabName).style.display = 'block';
      
      document.querySelectorAll('.nav-item').forEach(item => item.style.color = '#A0AEC0'); 
      el.style.color = 'var(--primary)';
      
      if (tabName === 'history') loadHistory();
    }

    async function loadHistory() {
      const listEl = document.getElementById('history-list');
      listEl.innerHTML = '<div class="text-center opacity-50 small mt-5">Đang tải dữ liệu...</div>';
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        let html = '';
        if (data.length === 0) {
          html = '<div class="text-center opacity-50 mt-4">Chưa có lịch sử</div>';
        } else {
          data.forEach(item => {
            const isGoal = item.water >= 2000 ? 'text-success-health' : '';
            const vitStatus = item.vitamin === 'Đã uống' ? '✅ Vitamin C' : '❌ Vitamin C';
            html += `
              <div class="history-item">
                <div class="history-date">${item.date}</div>
                <div class="history-stats">
                  <div class="stat-water ${isGoal}">${item.water} ml</div>
                  <div class="stat-vit">${vitStatus}</div>
                </div>
              </div>`;
          });
        }
        listEl.innerHTML = html;
      } catch (e) {
        listEl.innerHTML = '<div class="text-center text-danger mt-4">Lỗi kết nối</div>';
      }
    }

    // --- XỬ LÝ NÚT CÀI ĐẶT PWA ---
    let deferredPrompt;
    const installBtn = document.getElementById('btn-install');
    const iosGuide = document.getElementById('ios-guide');

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isStandalone = window.navigator.standalone === true;
    
    if (isIOS && !isStandalone) {
      iosGuide.style.display = 'block'; 
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); 
      deferredPrompt = e; 
      installBtn.style.display = 'block'; 
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt(); 
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          console.log('Đã đồng ý cài đặt');
        }
        deferredPrompt = null; 
        installBtn.style.display = 'none'; 
      }
    });

    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
      deferredPrompt = null;
    });

    window.onload = initApp;
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker đã đăng ký thành công!'))
          .catch(err => console.error('Lỗi đăng ký Service Worker:', err));
      });
    }
  </script>
</body>
</html>
